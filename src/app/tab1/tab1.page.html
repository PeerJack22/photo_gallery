<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Alerta
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Alerta</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-button style="padding: 250px;" id="present-alert">Haz clic</ion-button>
<ion-alert
  trigger="present-alert"
  header="Alerta"
  subHeader="Esto es una alerta"
  message="Es un mensaje para alerta"
  [buttons]="alertButtons"
></ion-alert>


</ion-content>
